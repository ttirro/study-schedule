<!DOCTYPE html>
<html lang="ko">
<head>
	<link rel="icon" type="image/png" href="images/favicon.png">
	<link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <title>민혁이의 실시간 계획표</title>
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            background-color: #1a1e24; /* 눈이 편안한 다크 테마 */
            color: #ffffff;
        }
        .card { 
            background: #252b35; 
            padding: 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            text-align: center; 
            width: 85%; 
            max-width: 500px; 
            border: 1px solid #343d4c;
        }
        h1 { font-size: 1.2rem; color: #8a99ad; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        #current-activity { font-size: 2.2rem; font-weight: 800; color: #4eedb4; margin: 15px 0; }
        #timer { font-size: 3.2rem; color: #ff5e62; font-weight: bold; font-variant-numeric: tabular-nums; margin-bottom: 25px; }
        
        .next-box {
            background: #1e232b;
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid #00adb5;
            text-align: left;
        }
        .next-title { font-size: 0.9rem; color: #00adb5; font-weight: bold; }
        #next-activity { font-size: 1.1rem; color: #e2e8f0; margin-top: 5px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h1>NOW ACTIVE</h1>
        <div id="current-activity">확인 중...</div>
        <div id="timer">00:00:00</div>
        
        <div class="next-box">
            <div class="next-title">▶ 다음 일정</div>
            <div id="next-activity">대기 중...</div>
        </div>
    </div>

    <script>
        const schedule = [
			{ start: "00:00", end: "07:00", task: "취침 상황💤" },
            { start: "07:00", end: "08:00", task: "기상, 씻기, 아침 식사" },
            { start: "08:00", end: "09:30", task: "[문학] 개념의 나비효과" },
            { start: "09:30", end: "09:40", task: "휴식 ☕" },
            { start: "09:40", end: "11:10", task: "[비문학/영어] 기출 풀기" },
            { start: "11:10", end: "12:10", task: "[국어] 수특 학습" },
            { start: "12:10", end: "13:10", task: "점심 식사 및 휴식 🍱" },
            { start: "13:10", end: "18:10", task: "[수학] 개기십기 🔥" },
            { start: "18:10", end: "19:10", task: "저녁 식사 및 휴식 🍙" },
            { start: "19:10", end: "22:10", task: "[세계지리] 개념 강좌" },
            { start: "22:10", end: "22:20", task: "휴식 ☕" },
            { start: "22:20", end: "23:20", task: "[한국지리] 복습" },
            { start: "23:20", end: "23:59", task: "하루 마무리, 잠자리로 💤" }
        ];

        function update() {
            const now = new Date();
            const nowTime = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            let found = false;

            for (let i = 0; i < schedule.length; i++) {
                const item = schedule[i];
                const [sH, sM] = item.start.split(':').map(Number);
                const [eH, eM] = item.end.split(':').map(Number);
                const startSec = sH * 3600 + sM * 60;
                const endSec = eH * 3600 + eM * 60;

                if (nowTime >= startSec && nowTime < endSec) {
                    const remainSec = endSec - nowTime;
                    const h = Math.floor(remainSec / 3600);
                    const m = Math.floor((remainSec % 3600) / 60);
                    const s = remainSec % 60;
                    
                    // 시간 단위 보정 출력 (시간이 있을 때만 시간 표시 추가)
                    let timeString = "";
                    if (h > 0) {
                        timeString = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                    } else {
                        timeString = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                    }
                    
                    document.getElementById('current-activity').innerText = item.task;
                    document.getElementById('timer').innerText = timeString;
                    
                    // 다음 교시 매칭 로직
                    const nextItem = schedule[i + 1];
                    if (nextItem) {
                        document.getElementById('next-activity').innerText = `[${nextItem.start}] ${nextItem.task}`;
                    } else {
                        document.getElementById('next-activity').innerText = "오늘 모든 일과 종료! 푹 자세요.";
                    }
                    
                    found = true;
                    break;
                }
            }

            if (!found) {
                document.getElementById('current-activity').innerText = "현재는 학습 시간 외입니다.";
                document.getElementById('timer').innerText = "00:00";
                document.getElementById('next-activity').innerText = "[07:00] 기상, 씻기, 아침 식사";
            }
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
